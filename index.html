<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ThumbPro - AI Thumbnail Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #09090f; --card: #13131c; --card2: #1a1a26;
  --border: rgba(255,255,255,0.08); --accent: #d9ff47;
  --text: #f0f0f8; --muted: #686880;
}
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* NAV */
nav {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 6%; height: 60px;
  background: rgba(9,9,15,0.95); border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 100;
}
.logo { font-family: 'Syne', sans-serif; font-size: 1.2rem; font-weight: 800; }
.logo span { color: var(--accent); }
.nav-tag {
  background: rgba(217,255,71,0.1); border: 1px solid rgba(217,255,71,0.2);
  color: var(--accent); font-size: 0.7rem; font-weight: 700;
  padding: 0.25rem 0.7rem; border-radius: 100px; letter-spacing: 0.07em; text-transform: uppercase;
}

/* MAIN LAYOUT */
.container { max-width: 1100px; margin: 0 auto; padding: 3rem 6%; }

/* HERO TEXT */
.hero-text { text-align: center; margin-bottom: 3rem; }
.hero-text h1 {
  font-family: 'Syne', sans-serif;
  font-size: clamp(2rem, 4.5vw, 3.5rem);
  font-weight: 800; letter-spacing: -0.04em; line-height: 1.1;
  margin-bottom: 1rem;
}
.hero-text h1 em {
  font-style: normal;
  background: linear-gradient(130deg, var(--accent), #aaff00);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.hero-text p { color: var(--muted); font-size: 1rem; font-weight: 300; }

/* INPUT CARD */
.input-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 16px; padding: 2rem; margin-bottom: 2rem;
}
.input-card label {
  display: block; font-size: 0.78rem; font-weight: 600;
  color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 0.6rem;
}
.topic-input {
  width: 100%; background: var(--bg); border: 1px solid var(--border);
  border-radius: 10px; color: var(--text); font-family: 'DM Sans', sans-serif;
  font-size: 0.95rem; padding: 0.85rem 1.1rem; outline: none; transition: border-color .2s;
  resize: none;
}
.topic-input:focus { border-color: rgba(217,255,71,0.35); }

/* OPTIONS ROW */
.options-row { display: flex; gap: 1rem; margin-top: 1rem; flex-wrap: wrap; }
.opt-group { flex: 1; min-width: 140px; }
.opt-group label { display: block; font-size: 0.72rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 0.4rem; }
.opt-select {
  width: 100%; background: var(--bg); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text); font-family: 'DM Sans', sans-serif;
  font-size: 0.85rem; padding: 0.6rem 0.85rem; outline: none; cursor: pointer;
}
.opt-select:focus { border-color: rgba(217,255,71,0.3); }

/* GENERATE BTN */
.gen-btn {
  width: 100%; margin-top: 1.3rem;
  background: var(--accent); color: #09090f; border: none;
  padding: 1rem; border-radius: 10px; font-size: 0.95rem; font-weight: 700;
  cursor: pointer; font-family: 'DM Sans', sans-serif;
  display: flex; align-items: center; justify-content: center; gap: 0.5rem;
  transition: all .25s; box-shadow: 0 0 30px rgba(217,255,71,.15);
}
.gen-btn:hover:not(:disabled) { background: #c5eb30; box-shadow: 0 0 50px rgba(217,255,71,.3); }
.gen-btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* LOADING */
.loading {
  display: none; flex-direction: column; align-items: center;
  justify-content: center; padding: 3rem; gap: 1rem;
}
.loading.show { display: flex; }
.spinner {
  width: 40px; height: 40px; border: 3px solid var(--border);
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading p { color: var(--muted); font-size: 0.88rem; }

/* RESULTS */
.results { display: none; }
.results.show { display: block; }

.results-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem;
}
.results-header h2 { font-family: 'Syne', sans-serif; font-size: 1.2rem; font-weight: 800; }
.regenerate-btn {
  background: none; border: 1px solid var(--border); color: var(--muted);
  padding: 0.45rem 1rem; border-radius: 8px; font-size: 0.82rem;
  cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all .2s;
}
.regenerate-btn:hover { color: var(--text); border-color: rgba(255,255,255,.2); }

/* THUMBNAIL CARDS */
.thumbs-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 1.5rem; }

.thumb-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 14px; overflow: hidden; transition: border-color .25s;
}
.thumb-card:hover { border-color: rgba(217,255,71,.2); }

/* CANVAS PREVIEW */
.canvas-wrap { position: relative; background: #000; aspect-ratio: 16/9; }
canvas { width: 100%; height: 100%; display: block; }
.thumb-badge {
  position: absolute; top: 0.6rem; left: 0.6rem;
  background: rgba(9,9,15,0.8); border: 1px solid var(--border);
  color: var(--accent); font-size: 0.65rem; font-weight: 700;
  padding: 0.2rem 0.55rem; border-radius: 100px; letter-spacing: 0.06em; text-transform: uppercase;
}

/* CARD INFO */
.thumb-info { padding: 1.2rem 1.4rem; }
.thumb-style {
  font-size: 0.7rem; font-weight: 700; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--accent); margin-bottom: 0.5rem;
}
.thumb-title { font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700; margin-bottom: 0.4rem; line-height: 1.35; }
.thumb-subtitle { color: var(--muted); font-size: 0.82rem; margin-bottom: 0.9rem; line-height: 1.5; }
.thumb-tags { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-bottom: 1rem; }
.tag {
  background: var(--card2); border: 1px solid var(--border);
  color: var(--muted); font-size: 0.7rem; padding: 0.2rem 0.55rem; border-radius: 6px;
}
.thumb-actions { display: flex; gap: 0.5rem; }
.btn-download {
  flex: 1; background: var(--accent); color: #09090f; border: none;
  padding: 0.6rem; border-radius: 8px; font-size: 0.82rem; font-weight: 700;
  cursor: pointer; font-family: 'DM Sans', sans-serif; transition: background .2s;
}
.btn-download:hover { background: #c5eb30; }
.btn-copy {
  background: var(--card2); border: 1px solid var(--border); color: var(--muted);
  padding: 0.6rem 1rem; border-radius: 8px; font-size: 0.82rem;
  cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all .2s;
}
.btn-copy:hover { color: var(--text); }

/* TIPS CARD */
.tips-card {
  margin-top: 1.5rem; background: var(--card);
  border: 1px solid rgba(217,255,71,.1); border-radius: 14px; padding: 1.5rem;
}
.tips-card h3 { font-family: 'Syne', sans-serif; font-size: 0.95rem; font-weight: 700; margin-bottom: 1rem; }
.tips-card h3 span { color: var(--accent); }
.tips-list { list-style: none; display: flex; flex-direction: column; gap: 0.55rem; }
.tips-list li { color: var(--muted); font-size: 0.85rem; display: flex; gap: 0.6rem; line-height: 1.55; }
.tips-list li::before { content: '→'; color: var(--accent); flex-shrink: 0; }

/* ERROR */
.error-box {
  display: none; background: rgba(255,80,80,0.08); border: 1px solid rgba(255,80,80,0.2);
  border-radius: 12px; padding: 1.2rem 1.5rem; color: #ff8080; font-size: 0.88rem; margin-top: 1rem;
}
.error-box.show { display: block; }

/* TOAST */
#toast {
  position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
  background: var(--accent); color: #09090f; padding: 0.65rem 1.4rem;
  border-radius: 10px; font-weight: 700; font-size: 0.85rem;
  box-shadow: 0 8px 30px rgba(0,0,0,.5); z-index: 999; display: none; white-space: nowrap;
}

@media (max-width: 600px) {
  .options-row { flex-direction: column; }
  .thumbs-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<nav>
  <div class="logo">Thumb<span>Pro</span></div>
  <div class="nav-tag">⚡ AI Powered</div>
</nav>

<div class="container">

  <div class="hero-text">
    <h1>Generate <em>viral thumbnails</em><br>with AI</h1>
    <p>Enter your video topic — AI will create thumbnail designs, bold text & layout ideas instantly</p>
  </div>

  <!-- INPUT -->
  <div class="input-card">
    <label>Your Video Topic / Title</label>
    <textarea class="topic-input" id="topicInput" rows="2" placeholder="e.g. How I made ₹1 Lakh in 30 days with freelancing | 10 Python tricks every developer must know | My honest review of iPhone 16"></textarea>

    <div class="options-row">
      <div class="opt-group">
        <label>Niche / Category</label>
        <select class="opt-select" id="nicheSelect">
          <option value="general">General</option>
          <option value="gaming">Gaming</option>
          <option value="finance">Finance / Money</option>
          <option value="tech">Tech / Coding</option>
          <option value="vlog">Vlogging</option>
          <option value="fitness">Fitness / Health</option>
          <option value="education">Education</option>
          <option value="business">Business</option>
          <option value="cooking">Cooking / Food</option>
          <option value="travel">Travel</option>
        </select>
      </div>
      <div class="opt-group">
        <label>Tone / Style</label>
        <select class="opt-select" id="toneSelect">
          <option value="shocking">Shocking / Clickbait</option>
          <option value="curiosity">Curiosity</option>
          <option value="professional">Professional</option>
          <option value="energetic">Energetic / Hype</option>
          <option value="emotional">Emotional / Story</option>
        </select>
      </div>
      <div class="opt-group">
        <label>Color Theme</label>
        <select class="opt-select" id="colorSelect">
          <option value="dark">Dark & Bold</option>
          <option value="red">Red & Black</option>
          <option value="blue">Blue & White</option>
          <option value="yellow">Yellow & Black</option>
          <option value="green">Green & Dark</option>
          <option value="purple">Purple & Gold</option>
        </select>
      </div>
    </div>

    <button class="gen-btn" id="genBtn" onclick="generateThumbnails()">
      ⚡ Generate AI Thumbnails
    </button>
  </div>

  <div class="error-box" id="errorBox"></div>
  
  <!-- LOADING -->
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p>AI is creating your thumbnail designs...</p>
  </div>

  <!-- RESULTS -->
  <div class="results" id="results">
    <div class="results-header">
      <h2>✅ Your Thumbnails Are Ready</h2>
      <button class="regenerate-btn" onclick="generateThumbnails()">🔄 Regenerate</button>
    </div>
    <div class="thumbs-grid" id="thumbsGrid"></div>
    <div class="tips-card" id="tipsCard" style="display:none">
      <h3>💡 <span>Pro Tips</span> for Higher CTR</h3>
      <ul class="tips-list" id="tipsList"></ul>
    </div>
  </div>

</div>

<div id="toast"></div>

<script>
// ── Color themes for canvas ──
const THEMES = {
  dark:   { bg: ['#09090f','#1a1a2e'], text: '#ffffff', accent: '#d9ff47', sub: '#aaaacc' },
  red:    { bg: ['#1a0000','#3d0000'], text: '#ffffff', accent: '#ff3b3b', sub: '#ffaaaa' },
  blue:   { bg: ['#00071a','#001440'], text: '#ffffff', accent: '#47b3ff', sub: '#aaccff' },
  yellow: { bg: ['#0f0a00','#2a1f00'], text: '#ffffff', accent: '#ffcc00', sub: '#ffeeaa' },
  green:  { bg: ['#000f05','#002010'], text: '#ffffff', accent: '#47ff7b', sub: '#aaffcc' },
  purple: { bg: ['#0d0017','#1e0035'], text: '#ffffff', accent: '#cc80ff', sub: '#e8c0ff' },
};

// ── Draw thumbnail on canvas ──
function drawThumbnail(canvas, data, colorKey) {
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const theme = THEMES[colorKey] || THEMES.dark;

  // Background gradient
  const grad = ctx.createLinearGradient(0, 0, W, H);
  grad.addColorStop(0, theme.bg[0]);
  grad.addColorStop(1, theme.bg[1]);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Decorative shapes
  ctx.save();
  ctx.globalAlpha = 0.12;
  ctx.fillStyle = theme.accent;
  ctx.beginPath();
  ctx.arc(W * 0.85, H * 0.2, H * 0.7, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 0.06;
  ctx.beginPath();
  ctx.arc(W * 0.1, H * 0.9, H * 0.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // Layout-specific design
  if (data.layout === 'split') {
    // Left color block
    ctx.save();
    ctx.globalAlpha = 0.15;
    ctx.fillStyle = theme.accent;
    ctx.fillRect(0, 0, W * 0.38, H);
    ctx.restore();
  }

  // Accent bar (bottom)
  ctx.fillStyle = theme.accent;
  ctx.fillRect(0, H - 6, W, 6);

  // Top label / channel badge
  if (data.badge) {
    ctx.fillStyle = theme.accent;
    ctx.beginPath();
    roundRect(ctx, 24, 20, measureText(ctx, data.badge, 'bold 22px DM Sans') + 28, 36, 6);
    ctx.fill();
    ctx.fillStyle = '#09090f';
    ctx.font = 'bold 20px DM Sans, sans-serif';
    ctx.fillText(data.badge, 38, 44);
  }

  // Main headline
  const mainY = data.badge ? 110 : 90;
  drawWrappedText(ctx, data.headline, 36, mainY, W - 60, {
    font: `bold ${data.headline.length > 20 ? '52' : '64'}px Syne, sans-serif`,
    color: theme.text,
    lineHeight: data.headline.length > 20 ? 58 : 72,
    maxLines: 2,
    shadow: true,
  });

  // Sub text
  if (data.subtext) {
    const subY = mainY + (data.headline.length > 20 ? 130 : 155);
    drawWrappedText(ctx, data.subtext, 36, subY, W - 200, {
      font: '28px DM Sans, sans-serif',
      color: theme.sub,
      lineHeight: 36,
      maxLines: 2,
    });
  }

  // Bottom stat / number
  if (data.stat) {
    ctx.save();
    ctx.fillStyle = theme.accent;
    ctx.font = 'bold 80px Syne, sans-serif';
    ctx.globalAlpha = 0.15;
    ctx.fillText(data.stat, W - 200, H - 30);
    ctx.globalAlpha = 1;
    ctx.font = 'bold 68px Syne, sans-serif';
    ctx.fillText(data.stat, W - 198, H - 32);
    ctx.restore();
  }

  // Emoji (large, right side)
  if (data.emoji) {
    ctx.font = `${H * 0.42}px serif`;
    ctx.globalAlpha = 0.9;
    ctx.fillText(data.emoji, W * 0.72, H * 0.72);
    ctx.globalAlpha = 1;
  }
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r);
  ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}

function measureText(ctx, text, font) {
  ctx.font = font;
  return ctx.measureText(text).width;
}

function drawWrappedText(ctx, text, x, y, maxW, opts) {
  ctx.font = opts.font;
  ctx.fillStyle = opts.color;
  if (opts.shadow) {
    ctx.shadowColor = 'rgba(0,0,0,0.8)';
    ctx.shadowBlur = 12;
  }
  const words = text.split(' ');
  let line = '', lines = [];
  for (let w of words) {
    const test = line ? line + ' ' + w : w;
    if (ctx.measureText(test).width > maxW && line) {
      lines.push(line); line = w;
      if (lines.length >= (opts.maxLines || 3)) break;
    } else { line = test; }
  }
  if (line && lines.length < (opts.maxLines || 3)) lines.push(line);
  lines.forEach((l, i) => ctx.fillText(l, x, y + i * opts.lineHeight));
  ctx.shadowBlur = 0;
}

// ── AI Generate ──
async function generateThumbnails() {
  const topic = document.getElementById('topicInput').value.trim();
  if (!topic) { showToast('⚠️ Please enter your video topic!'); return; }

  const niche = document.getElementById('nicheSelect').value;
  const tone = document.getElementById('toneSelect').value;
  const color = document.getElementById('colorSelect').value;

  // UI state
  document.getElementById('genBtn').disabled = true;
  document.getElementById('loading').classList.add('show');
  document.getElementById('results').classList.remove('show');
  document.getElementById('errorBox').classList.remove('show');

  try {
    const prompt = `You are a YouTube thumbnail expert. Generate 3 unique thumbnail designs for this video topic.

VIDEO TOPIC: "${topic}"
NICHE: ${niche}
TONE: ${tone}

For each thumbnail, respond with ONLY valid JSON (no markdown, no extra text):
{
  "thumbnails": [
    {
      "style": "Style name (e.g. Bold Statement, Curiosity Gap, Number Hook)",
      "headline": "Main big text (max 5 words, ALL CAPS, punchy)",
      "subtext": "Supporting text (max 8 words)",
      "badge": "Short label like NEW, VIRAL, MUST WATCH (max 2 words)",
      "stat": "A number or symbol like 10X or ₹1L or #1 (optional)",
      "emoji": "One relevant emoji",
      "layout": "full or split",
      "why": "One sentence: why this thumbnail will get clicks"
    }
  ],
  "tips": [
    "Tip 1 specific to this topic",
    "Tip 2 specific to this topic",
    "Tip 3 specific to this topic"
  ]
}`;

    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    if (!res.ok) throw new Error('API error ' + res.status);
    const data = await res.json();
    const raw = data.content.map(b => b.text || '').join('');

    // Parse JSON safely
    const jsonMatch = raw.match(/\{[\s\S]*\}/);
    if (!jsonMatch) throw new Error('Could not parse AI response');
    const parsed = JSON.parse(jsonMatch[0]);

    renderResults(parsed, color, topic);

  } catch (err) {
    const errBox = document.getElementById('errorBox');
    errBox.textContent = '❌ Something went wrong: ' + err.message + '. Please try again.';
    errBox.classList.add('show');
  } finally {
    document.getElementById('genBtn').disabled = false;
    document.getElementById('loading').classList.remove('show');
  }
}

function renderResults(parsed, color, topic) {
  const grid = document.getElementById('thumbsGrid');
  grid.innerHTML = '';

  parsed.thumbnails.forEach((t, i) => {
    const card = document.createElement('div');
    card.className = 'thumb-card';

    // Canvas
    const canvasWrap = document.createElement('div');
    canvasWrap.className = 'canvas-wrap';
    const canvas = document.createElement('canvas');
    canvas.width = 1280; canvas.height = 720;
    drawThumbnail(canvas, t, color);
    const badge = document.createElement('div');
    badge.className = 'thumb-badge';
    badge.textContent = 'Option ' + (i + 1);
    canvasWrap.appendChild(canvas);
    canvasWrap.appendChild(badge);

    // Tags
    const tagsHTML = [t.layout, color + ' theme'].map(tag =>
      `<span class="tag">${tag}</span>`
    ).join('');

    card.innerHTML = '';
    card.appendChild(canvasWrap);

    const info = document.createElement('div');
    info.className = 'thumb-info';
    info.innerHTML = `
      <div class="thumb-style">${t.style}</div>
      <div class="thumb-title">${t.headline}${t.subtext ? ' — ' + t.subtext : ''}</div>
      <div class="thumb-subtitle">${t.why}</div>
      <div class="thumb-tags">${tagsHTML}</div>
      <div class="thumb-actions">
        <button class="btn-download" onclick="downloadThumb(this)">⬇ Download</button>
        <button class="btn-copy" onclick="copyText('${t.headline.replace(/'/g,"\\'")}')">📋 Copy Text</button>
      </div>
    `;
    card.appendChild(info);

    // Store canvas ref for download
    card.querySelector('.btn-download')._canvas = canvas;
    card.querySelector('.btn-download')._topic = topic.substring(0, 30);

    grid.appendChild(card);
  });

  // Tips
  if (parsed.tips && parsed.tips.length) {
    const tipsList = document.getElementById('tipsList');
    tipsList.innerHTML = parsed.tips.map(t => `<li>${t}</li>`).join('');
    document.getElementById('tipsCard').style.display = 'block';
  }

  document.getElementById('results').classList.add('show');
  document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function downloadThumb(btn) {
  const canvas = btn._canvas;
  const name = (btn._topic || 'thumbnail').replace(/\s+/g, '-').toLowerCase();
  const link = document.createElement('a');
  link.download = 'thumbpro-' + name + '.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
  showToast('✅ Thumbnail downloaded!');
}

function copyText(text) {
  navigator.clipboard.writeText(text).then(() => showToast('✅ Text copied!')).catch(() => showToast('Copy: ' + text));
}

var toastT;
function showToast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg; el.style.display = 'block';
  clearTimeout(toastT);
  toastT = setTimeout(() => el.style.display = 'none', 2800);
}

// Enter key on textarea
document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('topicInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); generateThumbnails(); }
  });
});
</script>
</body>
</html>
